# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wa-blast-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-wa_blast_pro}
      MYSQL_USER: ${DB_USER:-wa_blast_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./backups/mysql:/backups
    ports:
      - "127.0.0.1:3307:3306"  # Only localhost access
    networks:
      - wa-blast-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: wa-blast-redis-prod
    restart: always
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./backups/redis:/backups
    ports:
      - "127.0.0.1:6380:6379"  # Only localhost access
    networks:
      - wa-blast-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: wa-blast-pro:${VERSION:-latest}
    container_name: wa-blast-app-prod
    restart: always
    ports:
      - "127.0.0.1:3001:3001"  # Only localhost, nginx will proxy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      HELMET_ENABLED: ${HELMET_ENABLED:-true}
      ENABLE_HTTPS: ${ENABLE_HTTPS:-true}
      # Optional: Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./server/logs:/app/logs:rw
      - ./server/wa-session:/app/wa-session:rw
      - wa-uploads:/app/uploads:rw
      - ./backups/app:/backups:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wa-blast-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: false  # Need write for wa-session and logs
    tmpfs:
      - /tmp

  # Optional: Nginx (if not using system nginx)
  nginx:
    image: nginx:alpine
    container_name: wa-blast-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - wa-blast-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Optional: Backup service
  backup:
    image: alpine:latest
    container_name: wa-blast-backup
    restart: "no"
    volumes:
      - mysql_data:/data/mysql:ro
      - redis_data:/data/redis:ro
      - wa-uploads:/data/uploads:ro
      - ./backups:/backups:rw
      - ./scripts/backup.sh:/backup.sh:ro
    command: /bin/sh -c "apk add --no-cache mysql-client && /backup.sh"
    networks:
      - wa-blast-network
    profiles:
      - backup

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /www/wwwroot/wa-blast-pro/data/mysql
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /www/wwwroot/wa-blast-pro/data/redis
  wa-uploads:
    driver: local
  nginx_logs:
    driver: local

networks:
  wa-blast-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Secrets (Docker Swarm only)
secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  redis_password:
    file: ./secrets/redis_password.txt
